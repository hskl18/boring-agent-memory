name: tests

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Run repo score
        run: python scripts/repo_score.py
      - name: Run memory eval
        run: >
          bam eval --json
          --min-recall-at-1 1.0
          --min-recall-at-3 1.0
          --min-source-accuracy 1.0
          --min-snippet-term-rate 1.0
          --min-stale-detection-rate 1.0
          --max-privacy-leaks 0
      - name: Run benchmark invariants
        run: python scripts/run_benchmark_v1.py --check --output /tmp/benchmark-v1.json
      - name: Run adversarial benchmark invariants
        run: python scripts/run_benchmark_v2.py --check --output /tmp/benchmark-v2.json
      - name: Run incremental lifecycle scenario
        run: python scripts/run_incremental_scenario.py
      - name: Build package
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
